<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokem</title>
  <style>
    body { font-family: monospace; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    #messages { border: 1px solid #ccc; height: 300px; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
    .msg-me     { text-align: right; color: #0066cc; }
    .msg-peer   { text-align: left;  color: #333; }
    .msg-system { text-align: center; color: #999; font-style: italic; font-size: 0.85em; }
    form { display: flex; gap: 8px; }
    input[type=text] { flex: 1; padding: 8px; font-family: monospace; }
    button { padding: 8px 16px; cursor: pointer; }
    #my-name  { font-weight: bold; margin-bottom: 4px; color: #0066cc; }
    #status   { margin-bottom: 8px; color: #666; }
    #room-url { background: #f5f5f5; padding: 8px; margin-bottom: 16px; word-break: break-all; }
  </style>
</head>
<body>
  <h2>Pokem</h2>
  <div id="app"></div>

  <script>
    const app = document.getElementById('app');
    const roomID = window.location.pathname.slice(1);

    if (!roomID) {
      app.innerHTML = `<button id="create-btn">Create Room</button>`;
      document.getElementById('create-btn').onclick = async () => {
        const res = await fetch('/api/room', { method: 'POST' });
        const { id } = await res.json();
        window.location.pathname = '/' + id;
      };
    } else {
      app.innerHTML = `
        <div id="room-url">Share this link with your friend:<br><strong>${window.location.href}</strong></div>
        <div id="my-name"></div>
        <div id="status">Connecting...</div>
        <div id="messages"></div>
        <form id="chat-form">
          <input id="input" type="text" placeholder="Type a message..." disabled autocomplete="off">
          <button type="submit" disabled>Send</button>
        </form>
      `;

      const myNameEl = document.getElementById('my-name');
      const status   = document.getElementById('status');
      const messages = document.getElementById('messages');
      const form     = document.getElementById('chat-form');
      const input    = document.getElementById('input');
      const sendBtn  = form.querySelector('button');

      let myName   = '';
      let peerName = '';

      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const ws = new WebSocket(`${proto}//${location.host}/ws/${roomID}`);

      function addMsg(label, text, cls) {
        const div = document.createElement('div');
        div.className = cls;
        div.textContent = label ? `${label}: ${text}` : text;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
      }

      ws.onopen = () => {
        status.textContent = 'Waiting for peer to join...';
      };

      ws.onmessage = ({ data }) => {
        const msg = JSON.parse(data);
        if (msg.type === 'welcome') {
          myName = msg.name;
          myNameEl.textContent = `You are: ${myName}`;
        } else if (msg.type === 'peer_info') {
          peerName = msg.name;
          status.textContent = `Peer connected!`;
          input.disabled = false;
          sendBtn.disabled = false;
          input.focus();
          addMsg(null, `--- ${peerName} joined ---`, 'msg-system');
        } else if (msg.type === 'system') {
          if (msg.text === 'peer disconnected') {
            status.textContent = `${peerName || 'Peer'} disconnected.`;
            input.disabled = true;
            sendBtn.disabled = true;
            addMsg(null, `--- ${peerName || 'peer'} left ---`, 'msg-system');
            peerName = '';
          }
        } else if (msg.type === 'chat') {
          addMsg(peerName, msg.text, 'msg-peer');
        }
      };

      ws.onerror = () => {};
      ws.onclose = () => {
        if (!myName) {
          window.location.pathname = '/';
          return;
        }
        status.textContent = 'Disconnected from server.';
        input.disabled = true;
        sendBtn.disabled = true;
      };

      form.onsubmit = (e) => {
        e.preventDefault();
        const text = input.value.trim();
        if (!text || ws.readyState !== WebSocket.OPEN) return;
        ws.send(JSON.stringify({ type: 'chat', text }));
        addMsg(myName, text, 'msg-me');
        input.value = '';
      };
    }
  </script>
</body>
</html>
